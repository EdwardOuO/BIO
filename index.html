<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IB Biology Study Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8faf8;color:#1a2e1a;min-height:100vh}
a{text-decoration:none;color:inherit}

/* NAV */
nav{background:#fff;border-bottom:1px solid #d4e8d4;position:sticky;top:0;z-index:100;padding:0 1.5rem}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:1rem;height:60px}
.logo{font-size:1.1rem;font-weight:700;color:#2d6a2d;white-space:nowrap}
.logo span{color:#5aab5a}
.nav-links{display:flex;gap:0.25rem;overflow-x:auto;flex:1}
.nav-link{padding:6px 12px;border-radius:20px;font-size:0.82rem;color:#4a6a4a;white-space:nowrap;cursor:pointer;transition:all 0.2s;border:none;background:none}
.nav-link:hover{background:#e8f5e8;color:#2d6a2d}
.nav-link.active{background:#2d6a2d;color:#fff}
.hl-badge{background:#e8f0ff;color:#3a5bc7;font-size:0.7rem;padding:2px 7px;border-radius:10px;font-weight:600}

/* HERO */
.hero{background:linear-gradient(135deg,#1a3a1a 0%,#2d6a2d 100%);color:#fff;padding:3rem 1.5rem;text-align:center}
.hero h1{font-size:2.2rem;font-weight:700;margin-bottom:0.5rem}
.hero p{opacity:0.85;font-size:1.05rem;max-width:560px;margin:0 auto 1.5rem}
.hero-badges{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap}
.badge{padding:5px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;border:1.5px solid rgba(255,255,255,0.4);color:#fff}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.section-title{font-size:1.4rem;font-weight:700;color:#1a3a1a;margin-bottom:1.25rem;display:flex;align-items:center;gap:0.5rem}
.section-title::after{content:'';flex:1;height:1px;background:#d4e8d4;margin-left:0.5rem}

/* TOPIC GRID */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:2.5rem}
.topic-card{background:#fff;border:1px solid #d4e8d4;border-radius:12px;padding:1.25rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.topic-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.topic-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(45,106,45,0.12);border-color:#5aab5a}
.topic-card.active{border-color:#2d6a2d;box-shadow:0 4px 20px rgba(45,106,45,0.2)}
.topic-icon{font-size:1.6rem;margin-bottom:0.5rem}
.topic-card h3{font-size:0.9rem;font-weight:700;color:#1a3a1a;margin-bottom:0.25rem}
.topic-card p{font-size:0.75rem;color:#5a7a5a}
.topic-num{position:absolute;top:0.75rem;right:0.75rem;font-size:0.7rem;color:#8aaa8a;font-weight:600}

/* CONTENT AREA */
#content-area{display:none}
#content-area.show{display:block}

/* TABS */
.tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;border-bottom:1px solid #d4e8d4;padding-bottom:0}
.tab{padding:8px 16px;border-radius:8px 8px 0 0;font-size:0.88rem;font-weight:600;cursor:pointer;color:#5a7a5a;border:none;background:none;border-bottom:2px solid transparent;transition:all 0.2s}
.tab:hover{color:#2d6a2d}
.tab.active{color:#2d6a2d;border-bottom-color:#2d6a2d;background:#f0f8f0}

/* SUMMARY */
.summary-box{background:#fff;border:1px solid #d4e8d4;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.summary-box h2{font-size:1.2rem;color:#1a3a1a;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid #e8f5e8}
.key-point{display:flex;gap:0.75rem;margin-bottom:0.75rem;align-items:flex-start}
.key-dot{width:8px;height:8px;border-radius:50%;background:#2d6a2d;margin-top:6px;flex-shrink:0}
.key-point p{font-size:0.9rem;line-height:1.6;color:#2a4a2a}
.def-box{background:#f0f8f0;border-left:3px solid #2d6a2d;padding:0.75rem 1rem;border-radius:0 8px 8px 0;margin:0.75rem 0;font-size:0.88rem;color:#1a3a1a}
.def-box strong{color:#2d6a2d}
.tip-box{background:#fffbeb;border-left:3px solid #f59e0b;padding:0.75rem 1rem;border-radius:0 8px 8px 0;margin:0.75rem 0;font-size:0.88rem;color:#78350f}

/* FLASHCARDS */
.flashcard-area{perspective:1000px;margin-bottom:1.5rem}
.flashcard{width:100%;min-height:200px;position:relative;transform-style:preserve-3d;transition:transform 0.5s;cursor:pointer;border-radius:12px}
.flashcard.flipped{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;border:1px solid #d4e8d4}
.card-front{background:#fff}
.card-back{background:#2d6a2d;color:#fff;transform:rotateY(180deg)}
.card-front h3{font-size:1.1rem;color:#1a3a1a;font-weight:700}
.card-back p{font-size:0.95rem;line-height:1.6}
.card-hint{font-size:0.8rem;color:#8aaa8a;margin-top:0.75rem}
.fc-controls{display:flex;gap:0.75rem;align-items:center;justify-content:space-between}
.fc-btn{padding:8px 20px;border-radius:8px;border:1px solid #d4e8d4;background:#fff;color:#2d6a2d;font-weight:600;cursor:pointer;font-size:0.88rem;transition:all 0.2s}
.fc-btn:hover{background:#f0f8f0}
.fc-btn.primary{background:#2d6a2d;color:#fff;border-color:#2d6a2d}
.fc-btn.primary:hover{background:#235223}
.fc-progress{font-size:0.85rem;color:#5a7a5a;font-weight:600}

/* QUIZ */
.quiz-q{background:#fff;border:1px solid #d4e8d4;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.quiz-q p{font-size:0.95rem;font-weight:600;color:#1a3a1a;margin-bottom:1rem}
.option{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.85rem;border-radius:8px;border:1px solid #d4e8d4;margin-bottom:0.5rem;cursor:pointer;transition:all 0.2s;font-size:0.88rem;color:#2a4a2a;background:#fafffe}
.option:hover{border-color:#5aab5a;background:#f0f8f0}
.option.correct{background:#dcf7dc;border-color:#2d6a2d;color:#1a3a1a}
.option.wrong{background:#fee2e2;border-color:#ef4444;color:#7f1d1d}
.option-circle{width:22px;height:22px;border-radius:50%;border:2px solid #d4e8d4;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;color:#5a7a5a}
.feedback{margin-top:0.75rem;padding:0.75rem 1rem;border-radius:8px;font-size:0.85rem;display:none}
.feedback.show{display:block}
.feedback.correct{background:#dcf7dc;color:#14532d}
.feedback.wrong{background:#fee2e2;color:#7f1d1d}
.quiz-score{background:#fff;border:1px solid #d4e8d4;border-radius:12px;padding:1.5rem;text-align:center;display:none}
.quiz-score.show{display:block}
.score-num{font-size:2.5rem;font-weight:700;color:#2d6a2d}

/* MNEMONIC */
.mnemonic-card{background:#fff;border:1px solid #d4e8d4;border-radius:12px;padding:1.25rem;margin-bottom:0.75rem}
.mnemonic-card h3{font-size:0.88rem;font-weight:700;color:#5a7a5a;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem}
.mnemonic-word{font-size:1.5rem;font-weight:700;color:#2d6a2d;margin-bottom:0.5rem;letter-spacing:0.05em}
.mnemonic-expand{font-size:0.88rem;color:#2a4a2a;line-height:1.6}
.mnemonic-expand span{font-weight:700;color:#2d6a2d}

/* DIAGRAM */
.diagram-box{background:#fff;border:1px solid #d4e8d4;border-radius:12px;padding:1.5rem;text-align:center;margin-bottom:1rem}
.diagram-box svg{max-width:100%;height:auto}
.diagram-caption{font-size:0.82rem;color:#5a7a5a;margin-top:0.75rem;font-style:italic}

/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:0.5rem;padding:8px 16px;border-radius:8px;border:1px solid #d4e8d4;background:#fff;color:#2d6a2d;font-weight:600;cursor:pointer;font-size:0.88rem;margin-bottom:1.5rem;transition:all 0.2s}
.back-btn:hover{background:#f0f8f0}

/* RESPONSIVE */
@media(max-width:600px){
.hero h1{font-size:1.6rem}
.topic-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo">IB Bio <span>Hub</span></div>

<div id="home-view">

  <main>
    <div class="section-title">📖 Choose a Topic</div>

</div>

<div id="topic-view" style="display:none">
  <main>
    <button class="back-btn" onclick="showHome()">← Back to Topics</button>

</div>

        "Transport: passive (simple diffusion, facilitated diffusion, osmosis) requires no energy. Active transport moves molecules against the gradient using ATP.",
        "Cell cycle: G1 (growth) → S (DNA synthesis) → G2 (prep) → Mitosis → Cytokinesis. Cyclins regulate checkpoints.",

      {q:"What is the difference between homologous and analogous structures?",a:"Homologous: same evolutionary origin, different functions (e.g., human arm and whale flipper = pentadactyl limb). Analogous: different origin, similar function (e.g., bird wing and insect wing)."},
      {q:"Name the binomial name for humans and explain the format.",a:"Homo sapiens. Genus name (Homo) is capitalised; species name (sapiens) is lowercase. Written in italics when typed, underlined when handwritten."},
      {q:"How does antibiotic resistance develop in bacteria?",a:"Random mutations give some bacteria resistance. When antibiotics are used, non-resistant bacteria die but resistant ones survive and reproduce, passing the resistance gene. The resistant strain becomes dominant."},

      {topic:"Types of Natural Selection",word:"DSD (Did Sam Disrupt?)",expand:"<span>D</span>irectional · <span>S</span>tabilising · <span>D</span>isruptive. Directional = one extreme wins. Stabilising = middle wins. Disruptive = both extremes win."}

      {q:"Which of the following is NOT a valid mechanism of reproductive isolation?",opts:["Geographical isolation","Temporal isolation","Nutritional isolation","Behavioural isolation"],ans:2,exp:"Nutritional isolation is not a recognised mechanism. The three main types are geographical (physical separation), temporal (different breeding seasons), and behavioural (different mating signals/rituals)."},

  {
    name:"Human Physiology",icon:"🫀",color:"#be185d",sub:"Digestion, blood, immunity, nerves, hormones",num:"Topic 6",
    summary:{
      title:"Human Physiology",
      points:[
        "Digestion breaks large insoluble molecules into small soluble ones for absorption. Key enzymes: amylase (starch→maltose), protease/pepsin (proteins→peptides), lipase (triglycerides→fatty acids+glycerol).",
        "Villi in the small intestine increase surface area for absorption. They have microvilli, a lacteal, capillaries, and are one cell thick.",
        "The heart has 4 chambers: right atrium → right ventricle → pulmonary circulation (lungs) → left atrium → left ventricle → systemic circulation (body). SA node is the pacemaker.",
        "Blood clotting: damaged tissue releases clotting factors → prothrombin → thrombin → fibrinogen → fibrin mesh → clot.",
        "Specific immunity: antigens → B-lymphocytes activated → plasma cells release antibodies → memory cells formed for future immunity.",
        "Gas exchange occurs at alveoli (thin walls, large surface area, moist, close to capillaries). Inhalation: diaphragm contracts and flattens, external intercostals contract.",
        "Neurons: resting potential −70mV (Na⁺/K⁺ pump). Action potential: depolarisation (Na⁺ in) → repolarisation (K⁺ out) → refractory period."
      ],
      defs:[
        {term:"Cardiac cycle",def:"The sequence of events in one heartbeat: atrial contraction → ventricular contraction (systole) → relaxation (diastole). Valves prevent backflow."},
        {term:"Action potential",def:"An all-or-none electrical impulse along a neuron. Threshold = −55mV. Depolarisation reaches +40mV then repolarises."},
        {term:"Negative feedback",def:"A mechanism where a change triggers a response that reverses the change, maintaining homeostasis (e.g., blood glucose regulation by insulin/glucagon)."}
      ],
      tip:"Blood vessel comparison: Arteries = thick walls, no valves, high pressure, carry AWAY from heart. Veins = thin walls, valves, low pressure, carry TO the heart. Capillaries = one cell thick, site of exchange."
    },

    flashcards:[
      {q:"What are the optimum pH values for pepsin and amylase?",a:"Pepsin (stomach protease): pH 2–3 (acidic). Amylase (salivary/pancreatic): pH 7 (neutral). Lipase (pancreatic): pH 7."},
      {q:"What is the role of memory cells in immunity?",a:"After a primary immune response, some B and T cells become memory cells. On secondary exposure to the same antigen, they respond much faster and more powerfully, producing large amounts of antibodies quickly."},
      {q:"How does the SA node control heart rate?",a:"The sinoatrial (SA) node in the right atrium generates electrical impulses that spread through the atria causing contraction, then through the bundle of His to the ventricles. It can be sped up by adrenalin and sympathetic nerves, slowed by parasympathetic nerves."},
      {q:"What happens during depolarisation of a neuron?",a:"Na⁺ voltage-gated channels open and Na⁺ floods INTO the neuron (down its concentration gradient). The membrane potential rises from −70mV toward +40mV. This is the action potential."},
      {q:"What is the role of glucagon?",a:"Glucagon is released by alpha cells of the pancreas when blood glucose is LOW. It stimulates the liver to break down glycogen (glycogenolysis) into glucose, raising blood glucose back to normal."},
    ],

      {topic:"Blood vessel comparison",word:"AVeC",expand:"<span>A</span>rteries: Away from heart, thick walls, no valves. <span>V</span>eins: Valves present, to heart, thin walls. <span>C</span>apillaries: one Cell thick, exchange site."},
      {topic:"Digestive enzymes",word:"PAL (Protein-Acid-Lipase)",expand:"<span>P</span>epsin breaks <span>P</span>roteins in stomach (acid, pH 2–3). <span>A</span>mylase breaks starch. <span>L</span>ipase breaks lipids (both pH 7, in small intestine/pancreas)."},

    quiz:[
      {q:"Which enzyme converts fibrinogen to fibrin during blood clotting?",opts:["Prothrombin","Thrombin","Fibrinase","Clotting factor"],ans:1,exp:"Thrombin (the active form of prothrombin) catalyses the conversion of soluble fibrinogen into insoluble fibrin, which forms the clot mesh."},
      {q:"Why does the left ventricle have thicker walls than the right?",opts:["It pumps blood to the lungs only","It pumps blood to the entire body (systemic circulation) at higher pressure","It has more valves","It receives blood from the aorta"],ans:1,exp:"The left ventricle must generate enough pressure to push oxygenated blood through the entire body (systemic circulation), which is a much longer distance than the pulmonary circuit."},
      {q:"What is the resting membrane potential of a neuron?",opts:["+40 mV","−55 mV","−70 mV","0 mV"],ans:2,exp:"The resting potential is −70mV, maintained by the Na⁺/K⁺ pump (3 Na⁺ out, 2 K⁺ in per ATP). Threshold for action potential is −55mV."},
    ]

  {name:"Nucleic Acids",icon:"🔗",color:"#0f766e",sub:"DNA structure, replication, transcription, translation",num:"Topic 7 (HL)",summary:{title:"Nucleic Acids (HL)",points:["Nucleosomes: DNA wraps twice around a core of 8 histone proteins. Histone H1 holds DNA to the core. Condensed chromatin (heterochromatin) is not transcribed; decondensed (euchromatin) is accessible.","DNA replication: Helicase unwinds. Leading strand: continuous (5'→3'). Lagging strand: Okazaki fragments (5'→3' per fragment) joined by DNA ligase. DNA polymerase adds to 3' end only.","Transcription: RNA polymerase binds to promoter → elongates mRNA 5'→3' → terminates. In eukaryotes, introns are spliced out; exons are joined. The 'antisense' strand is the template.","Translation: Ribosome reads mRNA 5'→3'. tRNA anticodons match mRNA codons. Start codon: AUG. Stop codons: UAG, UAA, UGA. The polypeptide grows at the A site.","Gene expression regulation: transcription factors (activators/repressors) bind to promoter regions. Epigenetic modifications: DNA methylation (silences genes), histone acetylation (promotes transcription), microRNAs (degrade mRNA)."],defs:[{term:"Okazaki fragments",def:"Short DNA sequences synthesised on the lagging strand during replication. DNA ligase joins them together."},{term:"Intron/Exon",def:"Introns are non-coding sequences spliced out from pre-mRNA. Exons are coding sequences that remain after splicing."}],tip:"Remember: DNA polymerase can only add nucleotides to the 3' end, and only using an existing strand as template. This is why the lagging strand needs primers and produces Okazaki fragments!"},diagram:{title:"Transcription & Translation Overview",svg:`<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,sans-serif"><rect width="480" height="300" fill="#f8faf8" rx="8"/><rect x="20" y="20" width="440" height="60" rx="8" fill="#ccfbf1" stroke="#0f766e" stroke-width="1.5"/><text x="240" y="42" text-anchor="middle" fill="#134e4a" font-size="12" font-weight="700">NUCLEUS</text><text x="240" y="60" text-anchor="middle" fill="#0f766e" font-size="10">DNA (antisense strand) → RNA polymerase → pre-mRNA → splicing (remove introns) → mRNA</text><text x="240" y="75" text-anchor="middle" fill="#065f46" font-size="9" font-style="italic">TRANSCRIPTION (5'→3')</text><rect x="20" y="110" width="440" height="60" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/><text x="240" y="132" text-anchor="middle" fill="#14532d" font-size="12" font-weight="700">CYTOPLASM</text><text x="240" y="150" text-anchor="middle" fill="#15803d" font-size="10">mRNA + ribosome → tRNA brings amino acids → peptide bonds form → polypeptide chain</text><text x="240" y="165" text-anchor="middle" fill="#166534" font-size="9" font-style="italic">TRANSLATION (AUG start → UAA/UAG/UGA stop)</text><line x1="240" y1="82" x2="240" y2="108" stroke="#374151" stroke-width="2" marker-end="url(#a5)"/><defs><marker id="a5" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#374151"/></marker></defs><text x="260" y="98" fill="#374151" font-size="9">mRNA exits through nuclear pore</text><rect x="20" y="200" width="440" height="80" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/><text x="240" y="222" text-anchor="middle" fill="#78350f" font-size="11" font-weight="700">Genetic Code</text><text x="240" y="242" text-anchor="middle" fill="#92400e" font-size="10">AUG = Start (Met) | UAA, UAG, UGA = Stop</text><text x="240" y="260" text-anchor="middle" fill="#92400e" font-size="10">Each codon = 3 bases → 1 amino acid | Code is universal &amp; degenerate</text><text x="240" y="275" text-anchor="middle" fill="#b45309" font-size="9" font-style="italic">Degenerate = multiple codons can code for the same amino acid</text></svg>`,caption:"Overview of transcription in the nucleus and translation in the cytoplasm. The genetic code is universal (same in all organisms) and degenerate (multiple codons per amino acid)."},flashcards:[{q:"What is the difference between the leading and lagging strand in DNA replication?",a:"Leading strand: synthesised continuously in the 5'→3' direction toward the replication fork. Lagging strand: synthesised in short Okazaki fragments (5'→3' away from the fork), later joined by DNA ligase."},{q:"What is RNA splicing?",a:"After transcription in eukaryotes, non-coding introns are removed from pre-mRNA and the coding exons are joined together to produce mature mRNA. This allows one gene to produce multiple proteins (alternative splicing)."},{q:"What is the role of tRNA in translation?",a:"tRNA carries a specific amino acid at its 3' end and has an anticodon that is complementary to the mRNA codon. It brings the correct amino acid to the ribosome during translation."}],mnemonics:[{topic:"Introns vs Exons",word:"INtrons are IN the trash; EXons are EXpressed",expand:"<span>IN</span>trons = spliced <span>IN</span>to the trash (removed). <span>EX</span>ons = <span>EX</span>pressed (kept and translated)."},{topic:"Stop codons",word:"UAA UAG UGA = U Are A Ugly Germ Away",expand:"<span>UAA</span> (<span>U A</span>re <span>A</span>wesome) · <span>UAG</span> (<span>U A</span>re <span>G</span>one) · <span>UGA</span> (<span>U G</span>o <span>A</span>way)"}],quiz:[{q:"Which enzyme joins Okazaki fragments on the lagging strand?",opts:["Helicase","DNA polymerase","DNA ligase","Primase"],ans:2,exp:"DNA ligase seals the nicks between Okazaki fragments, joining them into a continuous strand."},{q:"Epigenetic modification by DNA methylation generally results in:",opts:["Gene activation","Gene silencing","Increased transcription","mRNA degradation"],ans:1,exp:"Methylation of cytosine bases in DNA (especially at CpG sites) is associated with gene silencing — it prevents transcription factors from accessing the promoter."}]},
  {name:"Metabolism, Respiration & Photosynthesis",icon:"⚡",color:"#b45309",sub:"Krebs cycle, electron transport chain, Calvin cycle",num:"Topic 8 (HL)",summary:{title:"Metabolism, Respiration & Photosynthesis (HL)",points:["Glycolysis (cytoplasm): glucose → 2 pyruvate + 2 ATP net + 2 NADH. Occurs in aerobic and anaerobic conditions.","Link reaction (mitochondrial matrix): pyruvate → acetyl-CoA + CO₂ + NADH. Per glucose: 2 CO₂, 2 NADH, 2 acetyl-CoA.","Krebs cycle (matrix): acetyl-CoA + oxaloacetate → 6C intermediate → CO₂ + NADH + FADH₂ + ATP. Per glucose: 4 CO₂, 6 NADH, 2 FADH₂, 2 ATP.","Electron transport chain (inner mitochondrial membrane): NADH and FADH₂ donate electrons → H⁺ pumped into intermembrane space → chemiosmosis through ATP synthase → 34 ATP. O₂ is the final electron acceptor → H₂O.","Light-dependent reactions (thylakoid): photolysis of water → O₂ + H⁺ + electrons. Electrons excited in PSII → electron transport chain → ATP (photophosphorylation). PSI → NADPH.","Calvin cycle (stroma): 3CO₂ + 3RuBP → 6 GP → 6 TP (using NADPH and ATP) → 1 TP exits (glucose) + 3 RuBP regenerated."],defs:[{term:"Chemiosmosis",def:"Movement of H⁺ ions across the inner mitochondrial (or thylakoid) membrane through ATP synthase, using the electrochemical gradient to produce ATP."},{term:"Rubisco",def:"Enzyme that catalyses carbon fixation in the Calvin cycle: CO₂ + RuBP → 2 molecules of glycerate-3-phosphate (GP)."}],tip:"Remember the products: Glycolysis = 2 ATP. Link reaction = 0 ATP (just NADH + CO₂). Krebs = 2 ATP. ETC = ~34 ATP. Total aerobic = ~36-38 ATP per glucose."},diagram:{title:"Cellular Respiration Overview",svg:`<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,sans-serif"><rect width="480" height="300" fill="#f8faf8" rx="8"/><rect x="10" y="15" width="460" height="55" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/><text x="240" y="35" text-anchor="middle" fill="#78350f" font-size="11" font-weight="700">GLYCOLYSIS (Cytoplasm)</text><text x="240" y="52" text-anchor="middle" fill="#92400e" font-size="10">Glucose → 2 Pyruvate + 2 ATP (net) + 2 NADH</text><rect x="10" y="90" width="460" height="50" rx="6" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/><text x="240" y="110" text-anchor="middle" fill="#831843" font-size="11" font-weight="700">LINK REACTION (Mitochondrial Matrix)</text><text x="240" y="128" text-anchor="middle" fill="#9d174d" font-size="10">Pyruvate → Acetyl-CoA + CO₂ + NADH (×2 per glucose)</text><rect x="10" y="160" width="220" height="70" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="120" y="182" text-anchor="middle" fill="#14532d" font-size="11" font-weight="700">KREBS CYCLE (Matrix)</text><text x="120" y="198" text-anchor="middle" fill="#166534" font-size="10">Acetyl-CoA → 4CO₂</text><text x="120" y="213" text-anchor="middle" fill="#166534" font-size="10">6NADH + 2FADH₂ + 2ATP</text><rect x="250" y="160" width="220" height="70" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/><text x="360" y="182" text-anchor="middle" fill="#1e3a5f" font-size="11" font-weight="700">ETC + CHEMIOSMOSIS</text><text x="360" y="198" text-anchor="middle" fill="#1e40af" font-size="10">(Inner membrane)</text><text x="360" y="213" text-anchor="middle" fill="#1e40af" font-size="10">~34 ATP + H₂O (O₂ as acceptor)</text><defs><marker id="a6" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#374151"/></marker></defs><line x1="240" y1="72" x2="240" y2="88" stroke="#374151" stroke-width="2" marker-end="url(#a6)"/><line x1="240" y1="142" x2="120" y2="158" stroke="#374151" stroke-width="2" marker-end="url(#a6)"/><line x1="300" y1="142" x2="360" y2="158" stroke="#374151" stroke-width="2" marker-end="url(#a6)"/><text x="172" y="155" fill="#374151" font-size="9">NADH/FADH₂</text><text x="310" y="155" fill="#374151" font-size="9">NADH/FADH₂</text><rect x="10" y="252" width="460" height="38" rx="6" fill="#f0f9ff" stroke="#0284c7" stroke-width="1"/><text x="240" y="267" text-anchor="middle" fill="#0c4a6e" font-size="10" font-weight="700">TOTAL AEROBIC YIELD: ~36–38 ATP per glucose molecule</text><text x="240" y="282" text-anchor="middle" fill="#075985" font-size="9">Anaerobic (no O₂): only 2 ATP from glycolysis (fermentation)</text></svg>`,caption:"Aerobic cellular respiration produces 36–38 ATP per glucose across glycolysis, link reaction, Krebs cycle, and the electron transport chain."},flashcards:[{q:"What are the net products of glycolysis?",a:"Per glucose: 2 pyruvate, 2 ATP (net — 4 produced, 2 used), 2 NADH. Occurs in the cytoplasm. Does not require oxygen."},{q:"What is the role of NAD⁺ in cellular respiration?",a:"NAD⁺ is an electron carrier — it accepts hydrogen atoms (electrons + protons) to become NADH. NADH then donates electrons to the ETC, powering ATP synthesis via chemiosmosis."},{q:"What are the products of the light-dependent reactions?",a:"ATP, NADPH, and O₂ (released as a waste product from photolysis of water). These products power the Calvin cycle."}],mnemonics:[{topic:"Products of Krebs Cycle",word:"CO₂ FANS ATP",expand:"<span>CO₂</span> (carbon dioxide released) · <span>F</span>ADH₂ · <span>A</span>TP (2) · <span>N</span>ADH · <span>S</span>tarts again with oxaloacetate"},{topic:"Calvin Cycle steps",word:"FRR: Fix, Reduce, Regenerate",expand:"<span>F</span>ix CO₂ (with RuBP, catalysed by Rubisco) → <span>R</span>educe GP to TP (using ATP + NADPH) → <span>R</span>egenerate RuBP (using ATP)"}],quiz:[{q:"Where does the Krebs cycle take place?",opts:["Cytoplasm","Thylakoid membrane","Mitochondrial inner membrane","Mitochondrial matrix"],ans:3,exp:"The Krebs cycle (and link reaction) occur in the mitochondrial matrix — the fluid-filled interior of the mitochondrion."},{q:"What is the final electron acceptor in the electron transport chain?",opts:["NAD⁺","CO₂","Water","Oxygen"],ans:3,exp:"Oxygen (O₂) is the final electron acceptor in aerobic respiration. It combines with H⁺ and electrons at the end of the ETC to form water (H₂O) as a byproduct."}]},
  {name:"Plant Biology",icon:"🌱",color:"#3f6212",sub:"Xylem, phloem, transpiration, hormones, growth",num:"Topic 9 (HL)",summary:{title:"Plant Biology (HL)",points:["Water moves from roots → stem → leaves via xylem (dead hollow cells reinforced with lignin). Driving force: transpiration pull (tension-cohesion-adhesion).", "Transpiration rate is affected by: light intensity, temperature, humidity, and wind speed. Measured with a potometer.","Phloem transports organic solutes (sucrose, amino acids) from source (photosynthetic leaves) to sink (roots, fruits). Companion cells load sucrose via active co-transport.","Transpiration is reduced in xerophytes (desert plants) by: thick waxy cuticle, sunken stomata, CAM metabolism (stomata open at night), reduced leaf area (spines).", "Auxin controls phototropism: light causes auxin to redistribute to the shaded side, promoting elongation there, causing bending toward light.","Germination requires water (rehydration), oxygen (for respiration), and warmth (optimal enzyme activity)."],defs:[{term:"Transpiration",def:"Loss of water vapour from leaves through stomata. Creates a pulling force that draws water up through xylem."},{term:"Source and sink",def:"Source = where sucrose is produced (leaves). Sink = where sucrose is used or stored (roots, fruits, growing tips)."}],tip:"Xylem vs Phloem: Xylem = water + minerals, dead cells, moves upward only. Phloem = organic solutes (sucrose), living cells (with companion cells), moves both up and down."},diagram:{title:"Water Transport in Plants (TACT mechanism)",svg:`<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,sans-serif"><rect width="480" height="300" fill="#f8faf8" rx="8"/><rect x="200" y="10" width="80" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="240" y="32" text-anchor="middle" fill="#14532d" font-size="11" font-weight="700">LEAF</text><text x="240" y="48" text-anchor="middle" fill="#15803d" font-size="9">stomata open</text><rect x="215" y="60" width="50" height="150" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/><text x="240" y="140" text-anchor="middle" fill="#14532d" font-size="10" font-weight="700">XYLEM</text><text x="240" y="155" text-anchor="middle" fill="#15803d" font-size="9">lignified</text><text x="240" y="168" text-anchor="middle" fill="#15803d" font-size="9">dead cells</text><rect x="200" y="210" width="80" height="50" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><text x="240" y="232" text-anchor="middle" fill="#78350f" font-size="11" font-weight="700">ROOT</text><text x="240" y="248" text-anchor="middle" fill="#92400e" font-size="9">osmosis from soil</text><defs><marker id="a7" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#0f766e"/></marker></defs><line x1="240" y1="60" x2="240" y2="62" stroke="#0f766e" stroke-width="3" marker-end="url(#a7)"/><text x="310" y="85" fill="#0f766e" font-size="10" font-weight="700">T - Transpiration</text><text x="310" y="100" fill="#0f766e" font-size="9">Water evaporates</text><text x="310" y="113" fill="#0f766e" font-size="9">from leaf surface</text><text x="310" y="140" fill="#0f766e" font-size="10" font-weight="700">A - Adhesion</text><text x="310" y="155" fill="#0f766e" font-size="9">Water sticks to</text><text x="310" y="168" fill="#0f766e" font-size="9">xylem walls</text><text x="20" y="100" fill="#065f46" font-size="10" font-weight="700">C - Cohesion</text><text x="20" y="115" fill="#065f46" font-size="9">Water molecules</text><text x="20" y="128" fill="#065f46" font-size="9">stick together</text><text x="20" y="155" fill="#065f46" font-size="10" font-weight="700">T - Tension</text><text x="20" y="170" fill="#065f46" font-size="9">Negative pressure</text><text x="20" y="183" fill="#065f46" font-size="9">pulls water up</text><line x1="200" y1="120" x2="270" y2="120" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/><line x1="200" y1="150" x2="270" y2="150" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/></svg>`,caption:"The TACT mechanism explains water movement in plants: Transpiration → Tension → Cohesion → Adhesion. Water moves from soil → root → xylem → leaf → air."},flashcards:[{q:"How does auxin cause phototropism?",a:"Light causes auxin to migrate to the shaded side of the shoot. Higher auxin concentration on the shaded side promotes cell elongation there. The shaded side grows faster, causing the shoot to bend toward the light."},{q:"What adaptations do xerophytes have to reduce water loss?",a:"Thick waxy cuticle, sunken stomata (reduces air movement over stomata), CAM metabolism (stomata open at night), reduced leaf area (e.g., spines in cacti), rolled leaves, small leaves."}],mnemonics:[{topic:"Conditions for germination",word:"WOW",expand:"<span>W</span>ater (to rehydrate and activate enzymes) · <span>O</span>xygen (for aerobic respiration) · <span>W</span>armth (optimal temperature for enzymes)"}],quiz:[{q:"What structure loads sucrose into the phloem sieve tubes?",opts:["Xylem vessels","Guard cells","Companion cells","Root hair cells"],ans:2,exp:"Companion cells actively load sucrose into sieve tubes using co-transporter proteins and H⁺ gradients (secondary active transport)."},{q:"Which direction does water move during osmosis in a plant root taking up water from the soil?",opts:["From root cells into the soil","From the soil into root cells","From the xylem to the soil","From leaves to the root"],ans:1,exp:"Root cells have a higher solute concentration than the dilute soil solution, so water moves by osmosis from the soil (low solute) into root cells (high solute)."}]},
  {name:"Animal Physiology",icon:"🦴",color:"#6d28d9",sub:"Immunity, muscles, kidneys, reproduction",num:"Topic 10 (HL)",summary:{title:"Animal Physiology (HL)",points:["Antibodies are Y-shaped glycoproteins made of 2 heavy + 2 light polypeptide chains. Variable regions at the tips bind specific antigens. Produced by plasma cells (activated B lymphocytes).","Monoclonal antibodies are produced by fusing B plasma cells with tumour cells (hybridomas). Used in pregnancy tests (anti-HCG), cancer therapy, and diagnostics.","Muscle contraction (sliding filament theory): action potential → Ca²⁺ released → binds troponin → tropomyosin moves → myosin heads bind actin → power stroke (ADP + Pi released) → new ATP binds → cycle repeats.","Kidney (nephron): glomerulus (ultrafiltration) → proximal convoluted tubule (reabsorption of glucose, amino acids, 80% ions) → loop of Henle (salt/water regulation) → distal tubule → collecting duct (ADH regulates water).","ADH (anti-diuretic hormone): released when blood water is low → collecting duct inserts aquaporins → more water reabsorbed → concentrated urine.","Spermatogenesis (testes): continuous production, 4 sperm per meiosis. Oogenesis (ovaries): begins in fetal development, 1 egg per month, 3 polar bodies per meiosis."],defs:[{term:"Ultrafiltration",def:"Non-selective filtration of blood at the Bowman's capsule. Pressure forces small molecules (glucose, water, urea, ions) into the nephron. Large proteins and blood cells remain in the blood."},{term:"Sliding filament theory",def:"Muscle contraction occurs when actin filaments slide over myosin filaments. Z-lines come closer together; I-bands (light bands) shorten; A-band stays the same width."}],tip:"Remember the sarcomere zones: I band = actin only (light). A band = myosin (may overlap with actin). H zone = myosin only. During contraction: I and H bands shrink; A band stays the same!"},diagram:{title:"Nephron & Kidney Function",svg:`<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,sans-serif"><rect width="480" height="300" fill="#f8faf8" rx="8"/><ellipse cx="130" cy="60" rx="35" ry="30" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.5"/><text x="130" y="55" text-anchor="middle" fill="#1e3a5f" font-size="10" font-weight="700">Glomerulus</text><text x="130" y="68" text-anchor="middle" fill="#1e40af" font-size="9">Ultrafiltration</text><rect x="180" y="40" width="80" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="220" y="58" text-anchor="middle" fill="#14532d" font-size="10" font-weight="700">PCT</text><text x="220" y="72" text-anchor="middle" fill="#15803d" font-size="9">Reabsorption</text><rect x="285" y="40" width="90" height="40" rx="6" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/><text x="330" y="55" text-anchor="middle" fill="#831843" font-size="9" font-weight="700">Loop of Henle</text><text x="330" y="70" text-anchor="middle" fill="#9d174d" font-size="9">Salt/water balance</text><rect x="180" y="120" width="80" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="220" y="138" text-anchor="middle" fill="#78350f" font-size="10" font-weight="700">DCT</text><text x="220" y="152" text-anchor="middle" fill="#92400e" font-size="9">Fine-tuning</text><rect x="285" y="120" width="90" height="40" rx="6" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.5"/><text x="330" y="138" text-anchor="middle" fill="#4c1d95" font-size="10" font-weight="700">Collecting Duct</text><text x="330" y="152" text-anchor="middle" fill="#5b21b6" font-size="9">ADH → aquaporins</text><defs><marker id="a8" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#374151"/></marker></defs><line x1="165" y1="60" x2="183" y2="60" stroke="#374151" stroke-width="1.5" marker-end="url(#a8)"/><line x1="260" y1="60" x2="283" y2="60" stroke="#374151" stroke-width="1.5" marker-end="url(#a8)"/><line x1="330" y1="82" x2="330" y2="118" stroke="#374151" stroke-width="1.5" marker-end="url(#a8)"/><line x1="260" y1="140" x2="283" y2="140" stroke="#374151" stroke-width="1.5" marker-end="url(#a8)"/><line x1="220" y1="82" x2="220" y2="118" stroke="#374151" stroke-width="1.5" marker-end="url(#a8)"/><rect x="10" y="200" width="460" height="85" rx="8" fill="#fff" stroke="#d4e8d4" stroke-width="1"/><text x="240" y="220" text-anchor="middle" fill="#1a3a1a" font-size="11" font-weight="700">Composition changes through the nephron</text><text x="240" y="238" text-anchor="middle" fill="#374151" font-size="10">Glomerular filtrate: glucose ✓ | amino acids ✓ | urea ✓ | ions ✓ | NO proteins | NO RBCs</text><text x="240" y="255" text-anchor="middle" fill="#374151" font-size="10">After PCT: glucose ✗ (all reabsorbed) | urea ↑ (concentrated)</text><text x="240" y="272" text-anchor="middle" fill="#374151" font-size="10">Final urine: no glucose, concentrated urea, volume regulated by ADH</text></svg>`,caption:"The nephron filtration process. PCT = proximal convoluted tubule (most reabsorption). ADH controls water reabsorption in the collecting duct."},flashcards:[{q:"What is the sliding filament theory?",a:"Muscle contraction occurs when myosin heads bind to actin, pivot (power stroke), release, and reattach further along. Actin filaments slide toward the M-line, shortening the sarcomere. Ca²⁺ enables this by moving tropomyosin off the myosin binding sites."},{q:"How does ADH regulate water levels?",a:"When blood osmolarity is high (too little water), the pituitary releases ADH. ADH causes collecting duct cells to insert aquaporins (water channels) into their membranes, allowing more water to be reabsorbed. This produces small volumes of concentrated urine."},{q:"What is the difference between spermatogenesis and oogenesis?",a:"Spermatogenesis: continuous from puberty, produces 4 equal sperm per meiosis. Oogenesis: starts in fetal development, produces 1 egg + 3 polar bodies (unequal division — egg gets most cytoplasm). Released once per menstrual cycle."}],mnemonics:[{topic:"Sarcomere bands during contraction",word:"I Hate (shrink) A lot (stays)",expand:"During contraction: <span>I</span> band <span>shrinks</span> (actin only zone narrows). <span>H</span> zone <span>shrinks</span> (myosin-only zone narrows). <span>A</span> band <span>stays the same</span> (myosin length unchanged)."}],quiz:[{q:"What condition results from a low concentration of ADH?",opts:["Concentrated urine, small volume","Dilute urine, large volume","No urine production","Blood in urine"],ans:1,exp:"Without ADH, collecting duct cells have few aquaporins so little water is reabsorbed. Large volumes of dilute urine are produced (diabetes insipidus)."},{q:"During muscle contraction, calcium ions bind to which protein?",opts:["Myosin","Actin","Troponin","Tropomyosin"],ans:2,exp:"Ca²⁺ binds to troponin, which is part of the troponin-tropomyosin complex. This causes tropomyosin to shift, exposing the myosin-binding sites on actin, allowing the cross-bridge cycle to proceed."}]}
];

let curTopic = 0, curTab = 'summary', curCard = 0, cardFlipped = false;

function buildTopicGrid(){
  const g = document.getElementById('topic-grid');
  g.innerHTML = topics.map((t,i)=>`
    <div class="topic-card" style="--accent:${t.color}" onclick="openTopic(${i})">
      <span class="topic-num">${t.num}</span>
      <div class="topic-icon">${t.icon}</div>
      <h3>${t.name}</h3>
      <p>${t.sub}</p>
    </div>`).join('');
}

function showHome(){
  document.getElementById('home-view').style.display='block';
  document.getElementById('topic-view').style.display='none';
  document.querySelectorAll('.nav-link').forEach((l,i)=>{l.classList.toggle('active',i===0)});
}

function openTopic(i){
  curTopic = i;
  curTab = 'summary';
  const t = topics[i];
  document.getElementById('home-view').style.display='none';
  document.getElementById('topic-view').style.display='block';
  document.getElementById('topic-header').innerHTML=`
    <h2 style="font-size:1.5rem;color:${t.color};display:flex;align-items:center;gap:0.5rem">
      ${t.icon} ${t.name} <span style="font-size:0.8rem;color:#5a7a5a;font-weight:400">${t.num}</span>
    </h2>`;
  document.querySelectorAll('.nav-link').forEach((l,j)=>{l.classList.toggle('active',j===i+1)});
  switchTab('summary');
  window.scrollTo(0,0);
}

function switchTab(tab){
  curTab = tab;
  curCard = 0; cardFlipped = false;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[['summary','diagram','flashcards','mnemonics','quiz'].indexOf(tab)].classList.add('active');
  renderTab();
}

function renderTab(){
  const t = topics[curTopic];
  const el = document.getElementById('tab-content');
  if(curTab==='summary') el.innerHTML = renderSummary(t.summary);
  else if(curTab==='diagram') el.innerHTML = renderDiagram(t.diagram);
  else if(curTab==='flashcards') renderFlashcards(t.flashcards);
  else if(curTab==='mnemonics') el.innerHTML = renderMnemonics(t.mnemonics);
  else if(curTab==='quiz') el.innerHTML = renderQuiz(t.quiz);
}

function renderSummary(s){
  return `<div class="summary-box">
    <h2>${s.title}</h2>
    ${s.points.map(p=>`<div class="key-point"><div class="key-dot"></div><p>${p}</p></div>`).join('')}
    ${s.defs.map(d=>`<div class="def-box"><strong>${d.term}:</strong> ${d.def}</div>`).join('')}
    <div class="tip-box">💡 <strong>Exam Tip:</strong> ${s.tip}</div>
  </div>`;
}

function renderDiagram(d){
  return `<div class="diagram-box">
    <h3 style="margin-bottom:1rem;font-size:1rem;color:#1a3a1a">${d.title}</h3>
    ${d.svg}
    <p class="diagram-caption">${d.caption}</p>
  </div>`;
}

function renderFlashcards(cards){
  const el = document.getElementById('tab-content');
  const c = cards[curCard];
  el.innerHTML=`
    <div class="flashcard-area">
      <div class="flashcard${cardFlipped?' flipped':''}" onclick="flipCard()" id="fc">
        <div class="card-front">
          <div>
            <h3>${c.q}</h3>
            <p class="card-hint">Click to reveal answer</p>
          </div>
        </div>
        <div class="card-back"><p>${c.a}</p></div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn" onclick="prevCard()">← Previous</button>
      <span class="fc-progress">${curCard+1} / ${cards.length}</span>
      <button class="fc-btn primary" onclick="nextCard()">Next →</button>
    </div>`;
}

function flipCard(){cardFlipped=!cardFlipped;document.getElementById('fc').classList.toggle('flipped');}
function nextCard(){const cards=topics[curTopic].flashcards;curCard=(curCard+1)%cards.length;cardFlipped=false;renderFlashcards(cards);}
function prevCard(){const cards=topics[curTopic].flashcards;curCard=(curCard-1+cards.length)%cards.length;cardFlipped=false;renderFlashcards(cards);}

function renderMnemonics(mnemonics){
  return mnemonics.map(m=>`
    <div class="mnemonic-card">
      <h3>${m.topic}</h3>
      <div class="mnemonic-word">${m.word}</div>
      <div class="mnemonic-expand">${m.expand}</div>
    </div>`).join('');
}

function renderQuiz(quiz){
  return quiz.map((q,qi)=>`
    <div class="quiz-q" id="qq${qi}">
      <p>${qi+1}. ${q.q}</p>
      ${q.opts.map((o,oi)=>`
        <div class="option" onclick="checkAnswer(${qi},${oi})" id="opt${qi}-${oi}">
          <div class="option-circle">${String.fromCharCode(65+oi)}</div>
          ${o}
        </div>`).join('')}
      <div class="feedback" id="fb${qi}"></div>
    </div>`).join('');
}

function checkAnswer(qi,oi){
  const q = topics[curTopic].quiz[qi];
  document.querySelectorAll(`#qq${qi} .option`).forEach(o=>o.style.pointerEvents='none');
  const sel = document.getElementById(`opt${qi}-${oi}`);
  const cor = document.getElementById(`opt${qi}-${q.ans}`);
  cor.classList.add('correct');
  if(oi!==q.ans) sel.classList.add('wrong');
  const fb = document.getElementById(`fb${qi}`);
  fb.className = `feedback show ${oi===q.ans?'correct':'wrong'}`;
  fb.textContent = (oi===q.ans?'✅ Correct! ':'❌ Incorrect. ') + q.exp;
}

buildTopicGrid();
</script>
